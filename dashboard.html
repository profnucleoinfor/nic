<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Área do Aluno | Portal de Aprendizado</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="https://i.ibb.co/nLPy4WY/Imagem2.png">

<style>
:root{
  --fundo:#0f172a;
  --card:#1e293b;
  --borda:#334155;
  --texto:#f1f5f9;
  --texto-sec:#94a3b8;
  --azul:#3b82f6;
  --azul-hover:#2563eb;
  --verde:#10b981;
  --ouro:#fbbf24; /* Cor para XP/Pontos */
  --gradiente:linear-gradient(135deg,#3b82f6,#2563eb);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:var(--fundo);
  color:var(--texto);
  line-height: 1.6;
}

header{
  background:#1e293be0;
  backdrop-filter:blur(10px);
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--borda);
  position:sticky; top:0; z-index: 100;
}

.btn-sair{
  background:rgba(255,255,255,0.1);
  color:#fff;
  padding:8px 22px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  transition:.2s;
  border: 1px solid var(--borda);
}
.btn-sair:hover{background:#ef4444; border-color:#ef4444;}

.container{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.dashboard-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.info-box, .avatar-wrapper{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:16px;
  padding:22px;
}

.avatar-wrapper{
  display:flex;
  align-items:center;
  gap:18px;
}

.avatar-wrapper img{
  width:64px;height:64px;border-radius:50%;
  border: 2px solid var(--azul);
}

.fala{
  background:#334155;
  padding:12px 18px;
  border-radius:12px;
  font-size:14px;
  transition: opacity 0.4s ease;
}

.btn-pontos{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding:16px;
  background:var(--gradiente);
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  margin-bottom:40px;
  transition:.3s;
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}
.btn-pontos:hover{transform:translateY(-3px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);}

.modulos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:25px;
}

.modulo-card{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:16px;
  padding:24px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.25s;
  position: relative;
  overflow: hidden;
}

.modulo-card::before {
    content: "MÓDULO";
    position: absolute;
    top: 10px;
    right: -20px;
    background: var(--borda);
    font-size: 10px;
    padding: 2px 25px;
    transform: rotate(45deg);
    color: var(--texto-sec);
}

.modulo-card:hover{
  transform:translateY(-6px);
  border-color:var(--azul);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.xp-badge {
    background: rgba(251, 191, 36, 0.1);
    color: var(--ouro);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
    border: 1px solid rgba(251, 191, 36, 0.3);
}

.modulo-card h2{margin-bottom:8px; font-size: 1.3rem;}
.modulo-card p{color:var(--texto-sec);font-size:14px; margin-bottom: 15px;}

.btn-acessar{
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--borda);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition: .3s;
}
.modulo-card:hover .btn-acessar{background:var(--azul); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);}

.professor-section{
  margin-top:40px;
  padding:30px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border: 1px dashed var(--verde);
  border-radius:20px;
  text-align:center;
}

@media(max-width:768px){
  .dashboard-top{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <h1>🎓 Área do Aluno</h1>
  <a href="index.html" class="btn-sair">SAIR</a>
</header>

<div class="container">

<div class="dashboard-top">
  <div class="info-box">
    👤 <strong id="nomeAluno"></strong><br>
    📅 <span id="diaAula"></span><br>
    ⏰ <span id="horarioAula"></span>
  </div>

  <div class="avatar-wrapper">
    <img src="https://i.ibb.co/NdNrybj2/drive.webp" alt="Avatar">
    <div class="fala" id="frase">Prepare-se para evoluir!</div>
  </div>
</div>

<a href="pontos.html" class="btn-pontos">🏅 Sistema de Pontos</a>

<div class="modulos-grid" id="gridModulos"></div>

<div class="professor-section">
    <img src="https://i.ibb.co/NdNrybj2/drive.webp" width="100 alt="Elinaldo Junior" class="foto-prof">
    <div class="professor-text">
      <h3>👨‍🏫 Seu Instrutor</h3>
      <p>Olá! Sou <strong>Elinaldo Junior</strong>. Meu objetivo é garantir que você aprenda tecnologia de forma humanizada.</p>
      <a class="linkedin-icon" href="https://www.linkedin.com/in/elinaldo-junior-389bb911b" target="_blank">
       <center> <img src="https://i.ibb.co/rRv0hwK7/meu-linkedin-156-1.webp" alt="LinkedIn" width="150"></center>
      </a>
    </div>
  </div>

</div>

<footer style="text-align:center;padding:40px;color:#94a3b8; font-size: 14px;">
© 2026 Elinaldo Junior - Sistema de Gestão Pedagógica
</footer>

<script>
/* DADOS DO LOCALSTORAGE */
document.getElementById("nomeAluno").innerText = "Aluno: " + (localStorage.getItem("nomeAluno") || "Estudante");
document.getElementById("diaAula").innerText = "Aula: " + (localStorage.getItem("diaAula") || "A definir");
document.getElementById("horarioAula").innerText = "Horário: " + (localStorage.getItem("horarioAula") || "A definir");

/* FRASES MOTIVACIONAIS */
const frases=[
"Aprenda no seu tempo.",
"Cada passo importa na sua jornada.",
"Você está indo muito bem!",
"Tecnologia abre portas para o futuro.",
"Nunca pare de evoluir!",
"O erro é o primeiro passo do acerto."
];

let currentFrase=0;
const fraseElement = document.getElementById("frase");

setInterval(()=>{
  fraseElement.style.opacity=0;
  setTimeout(()=>{
    fraseElement.innerText = frases[currentFrase];
    fraseElement.style.opacity=1;
    currentFrase = (currentFrase + 1) % frases.length;
  },400);
},6000);

/* LISTA DE MÓDULOS COM XP */
const MODULOS = [
  {titulo:"🖥️ Windows + Linux", senha:"windowslinux", pagina:"windows.html", desc:"Sistemas operacionais e arquivos", xp: "1000 XP"},
  {titulo:"📝 Word + Digitação", senha:"worddigitacao", pagina:"word.html", desc:"Documentos e digitação profissional", xp: "1120 XP"},
  {titulo:"📊 Excel", senha:"excel", pagina:"excel.html", desc:"Planilhas, fórmulas e automação", xp: "1200 XP"},
  {titulo:"📽️ PowerPoint", senha:"powerpoint", pagina:"powerpoint.html", desc:"Apresentações que impressionam", xp: "600 XP"},
  {titulo:"🌐 Internet e Redes", senha:"internet", pagina:"internet.html", desc:"Navegação segura e redes sociais", xp: "320 XP"},
  {titulo:"🎨 Canva Design", senha:"canva", pagina:"canva.html", desc:"Design visual e criação de conteúdo", xp: "360 XP"},
  {titulo:"🤖 Inteligência Artificial", senha:"ia", pagina:"ia.html", desc:"O futuro aplicado ao seu dia a dia", xp: "800 XP"}
];

const grid = document.getElementById("gridModulos");

MODULOS.forEach(mod=>{
  grid.innerHTML += `
    <div class="modulo-card">
      <div>
        <span class="xp-badge">💎 ${mod.xp}</span>
        <h2>${mod.titulo}</h2>
        <p>${mod.desc}</p>
      </div>
      <button class="btn-acessar" onclick="acessarModulo('${mod.senha}','${mod.pagina}')">
        Entrar na Aula
      </button>
    </div>
  `;
});

/* ACESSO COM SENHA (TRIM ADICIONADO) */
function acessarModulo(senhaCorreta,pagina){
  const entrada = prompt("🔒 Digite a senha do módulo:");
  
  if(!entrada) return;

  // O .trim() remove espaços vazios acidentais antes ou depois da senha
  if(entrada.trim().toLowerCase() === senhaCorreta.toLowerCase()){
    window.location.href = pagina;
  }else{
    alert("❌ Senha incorreta! Peça ao professor se esqueceu.");
  }
}
</script>

</body>
</html>
