<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drive Elinaldo Junior - Acesso</title>

  <link rel="icon" type="image/png" href="https://i.ibb.co/nLPy4WY/Imagem2.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --fundo: #0f172a;
      --card: #1e293b;
      --azul: #3b82f6;
      --borda: #334155;
    }

    body {
      background-color: var(--fundo);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      max-width: 420px;
      width: 90%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(15px);
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid var(--borda);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .logo {
      max-width: 100px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
    }

    .form-label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 5px;
      margin-left: 5px;
    }

    .form-control, .form-select {
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--borda);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .form-control:focus, .form-select:focus {
      background-color: rgba(15, 23, 42, 0.8);
      border-color: var(--azul);
      color: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .btn-glow {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border: none;
      color: #fff;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      margin-top: 10px;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
    }

    .typed-text {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 25px;
      font-style: italic;
      min-height: 40px;
    }
  </style>
</head>

<body>

<main class="login-box">
  <img src="https://i.ibb.co/NdNrybj2/drive.webp" class="logo" alt="NeoTech Logo" />

  <h1 class="h4 mb-1">Bem-vindo(a)</h1>
  <p class="text-muted mb-4">Identifique-se para acessar suas aulas</p>

  <form onsubmit="return validateLogin()" autocomplete="off">
    <label class="form-label">Nome Completo</label>
    <input type="text" id="username" class="form-control" placeholder="Seu nome aqui" required>

    <div class="row">
      <div class="col-6">
        <label class="form-label">Dia da Aula</label>
        <select id="diaAula" class="form-select" required>
          <option value="" disabled selected>Escolha</option>
          <option value="Quarta-feira">Quarta</option>
          <option value="Sábado">Sábado</option>
        </select>
      </div>
      <div class="col-6">
        <label class="form-label">Horário</label>
        <input type="time" id="horarioAula" class="form-control" required>
      </div>
    </div>

    <button type="submit" class="btn btn-glow w-100">Entrar no Portal</button>
  </form>

  <div class="typed-text">
    <span id="typed-text"></span>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Texto animado (Versículos e frases)
    new Typed('#typed-text', {
      strings: [
        "\"Seja forte e corajoso.\" (Josué 1:9)",
        "\"O conhecimento liberta.\"",
        "\"Tudo posso naquele que me fortalece.\""
      ],
      typeSpeed: 50,
      backSpeed: 30,
      loop: true
    });

    // Recuperar nome anterior se existir para facilitar o login
    const nomeSalvo = localStorage.getItem("nomeAluno");
    if (nomeSalvo) document.getElementById("username").value = nomeSalvo;
  });

  function validateLogin() {
    const nome = document.getElementById("username").value.trim();
    const dia = document.getElementById("diaAula").value;
    const hora = document.getElementById("horarioAula").value;

    // Salvar as informações para serem exibidas no topo da Área do Aluno
    localStorage.setItem("nomeAluno", nome);
    localStorage.setItem("diaAula", dia);
    localStorage.setItem("horarioAula", hora);

    // Redireciona para a página principal (Certifique-se que o nome do arquivo está correto)
    // Se o seu arquivo da Área do Aluno tiver outro nome, altere abaixo:
    window.location.href = "dashboard.html";

    return false; // Evita o reload da página
  }
</script>

</body>
</html>
